spring.application.name=Qatra

spring.threads.virtual.enabled=true

spring.datasource.url=jdbc:postgresql://localhost:5432/qatra
spring.datasource.username=qatra
spring.datasource.password=qatra
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator
management.endpoints.web.exposure.include=health,info,modules
management.endpoint.health.show-details=always

# Spring Modulith
spring.modulith.detection.base-packages=com.zayenha
spring.modulith.runtime.verification-enabled=true

# JWT (override via JWT_SECRET / JWT_EXPIRATION_MS)
jwt.secret=${JWT_SECRET:QatraSecretKeyMustBeAtLeast256BitsLongForHS256AlgorithmMinimum}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Emergency
emergency.expiration-hours=${EMERGENCY_EXPIRATION_HOURS:48}

# Slot generation
slot-generation.lookahead-days=${SLOT_GENERATION_LOOKAHEAD_DAYS:21}
slot-generation.default-period-minutes=${SLOT_GENERATION_DEFAULT_PERIOD_MINUTES:60}
slot-generation.timezone=${SLOT_GENERATION_TIMEZONE:UTC}

# CORS
cors.max-age=${CORS_MAX_AGE:3600}
cors.allowed-methods=${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
cors.allowed-headers=${CORS_ALLOWED_HEADERS:*}
cors.path-pattern=${CORS_PATH_PATTERN:/api/**}

# Kafka topics (each with name, partitions, replicas)
kafka.topic.appointment-events.name=${KAFKA_TOPIC_APPOINTMENT_EVENTS:appointment-events}
kafka.topic.appointment-events.partitions=${KAFKA_TOPIC_APPOINTMENT_EVENTS_PARTITIONS:3}
kafka.topic.appointment-events.replicas=${KAFKA_TOPIC_APPOINTMENT_EVENTS_REPLICAS:1}
kafka.topic.emergency-events.name=${KAFKA_TOPIC_EMERGENCY_EVENTS:emergency-events}
kafka.topic.emergency-events.partitions=${KAFKA_TOPIC_EMERGENCY_EVENTS_PARTITIONS:3}
kafka.topic.emergency-events.replicas=${KAFKA_TOPIC_EMERGENCY_EVENTS_REPLICAS:1}
kafka.topic.audit-events.name=${KAFKA_TOPIC_AUDIT_EVENTS:audit-events}
kafka.topic.audit-events.partitions=${KAFKA_TOPIC_AUDIT_EVENTS_PARTITIONS:2}
kafka.topic.audit-events.replicas=${KAFKA_TOPIC_AUDIT_EVENTS_REPLICAS:1}
kafka.topic.notification-dispatch.name=${KAFKA_TOPIC_NOTIFICATION_DISPATCH:notification.dispatch}
kafka.topic.notification-dispatch.partitions=${KAFKA_TOPIC_NOTIFICATION_DISPATCH_PARTITIONS:3}
kafka.topic.notification-dispatch.replicas=${KAFKA_TOPIC_NOTIFICATION_DISPATCH_REPLICAS:1}
kafka.topic.emergency-created.name=${KAFKA_TOPIC_EMERGENCY_CREATED:emergency.created}
kafka.topic.emergency-created.partitions=${KAFKA_TOPIC_EMERGENCY_CREATED_PARTITIONS:3}
kafka.topic.emergency-created.replicas=${KAFKA_TOPIC_EMERGENCY_CREATED_REPLICAS:1}
kafka.topic.appointment-reminder.name=${KAFKA_TOPIC_APPOINTMENT_REMINDER:appointment.reminder}
kafka.topic.appointment-reminder.partitions=${KAFKA_TOPIC_APPOINTMENT_REMINDER_PARTITIONS:3}
kafka.topic.appointment-reminder.replicas=${KAFKA_TOPIC_APPOINTMENT_REMINDER_REPLICAS:1}
kafka.topic.eligibility-restored.name=${KAFKA_TOPIC_ELIGIBILITY_RESTORED:eligibility.restored}
kafka.topic.eligibility-restored.partitions=${KAFKA_TOPIC_ELIGIBILITY_RESTORED_PARTITIONS:3}
kafka.topic.eligibility-restored.replicas=${KAFKA_TOPIC_ELIGIBILITY_RESTORED_REPLICAS:1}

# Questionnaire
questionnaire.permanent-restriction-keywords=${QUESTIONNAIRE_PERMANENT_RESTRICTION_KEYWORDS:insulin,chemo,immunosuppressant}

# Super admin seed (no defaults — seed skipped when unset)
super-admin.email=${SUPER_ADMIN_EMAIL:}
super-admin.phone=${SUPER_ADMIN_PHONE:}
super-admin.password=${SUPER_ADMIN_PASSWORD:}

# Cache
spring.cache.type=${SPRING_CACHE_TYPE:simple}

# Cache TTL (seconds) per module/entity — module.entity-<name>.ttl
user.entity-user.ttl=${CACHE_TTL_USER:3600}
donor.entity-donorprofile.ttl=${CACHE_TTL_DONOR_PROFILE:3600}
donor.entity-impact.ttl=${CACHE_TTL_DONOR_IMPACT:300}
center.entity-donationcenter.ttl=${CACHE_TTL_CENTER:1800}
center.entity-slot.ttl=${CACHE_TTL_SLOT:120}
center.entity-staff.ttl=${CACHE_TTL_STAFF:3600}
appointment.entity-appointment.ttl=${CACHE_TTL_APPOINTMENT:120}
appointment.entity-screening.ttl=${CACHE_TTL_SCREENING:120}
emergency.entity-emergency.ttl=${CACHE_TTL_EMERGENCY:60}
emergency.entity-response.ttl=${CACHE_TTL_RESPONSE:120}
cache.default-ttl-seconds=${CACHE_DEFAULT_TTL:300}

# DevTools
spring.devtools.restart.enabled=${DEVTOOLS_RESTART:true}
spring.devtools.livereload.enabled=${DEVTOOLS_LIVERELOAD:true}

# Modulith Observability
spring.modulith.observability.events.enabled=true
