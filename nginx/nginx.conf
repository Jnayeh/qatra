upstream donation-api {
    server donation-service:8080;
}

upstream notification-api {
    server notification-service:8082;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;

    # Notification REST API
    location /api/v1/notifications {
        proxy_pass http://notification-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoint (broadcast)
    location /ws/notifications {
        proxy_pass http://notification-api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Everything else under /api/ goes to donation-service
    location /api/ {
        proxy_pass http://donation-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health
    location /health {
        proxy_pass http://donation-api/actuator/health;
        proxy_set_header Host $host;
    }

    # Root redirect
    location / {
        return 302 /health;
    }
}
