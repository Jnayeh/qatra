name: CI

on:
  pull_request:
    branches: [qatra_test]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [donation-service, notification-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: ./mvnw -B test
