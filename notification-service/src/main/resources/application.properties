spring.application.name=Qatra-notification

spring.threads.virtual.enabled=true

server.port=${SERVER_PORT:8082}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/qatra_notification}
spring.datasource.username=${DB_USERNAME:qatra_notification}
spring.datasource.password=${DB_PASSWORD:qatra_notification}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.health.mail.enabled=false

# JWT (shared secret with main backend)
jwt.secret=${JWT_SECRET:QatraSecretKeyMustBeAtLeast256BitsLongForHS256AlgorithmMinimum}

# Kafka consumer
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka topics consumed by notification service
kafka.topic.emergency-created.name=${KAFKA_TOPIC_EMERGENCY_CREATED:emergency.created}
kafka.topic.appointment-reminder.name=${KAFKA_TOPIC_APPOINTMENT_REMINDER:appointment.reminder}
kafka.topic.eligibility-restored.name=${KAFKA_TOPIC_ELIGIBILITY_RESTORED:eligibility.restored}
kafka.topic.eligibility-reminder.name=${KAFKA_TOPIC_ELIGIBILITY_REMINDER:eligibility.reminder}
kafka.topic.password-reset.name=${KAFKA_TOPIC_PASSWORD_RESET:password.reset}
kafka.topic.email-verification.name=${KAFKA_TOPIC_EMAIL_VERIFICATION:email.verification}

# Notification channels (comma-separated)
notification.channels=${NOTIFICATION_CHANNELS:IN_APP,EMAIL,PUSH}

# Retry
notification.retry.max-attempts=${NOTIFICATION_RETRY_MAX_ATTEMPTS:3}
notification.retry.backoff-base-ms=${NOTIFICATION_RETRY_BACKOFF_BASE_MS:2000}

# Email (SendGrid default)
email.channel.provider=${EMAIL_CHANNEL_PROVIDER:sendgrid}
email.channel.from=${EMAIL_CHANNEL_FROM:noreply@qatra.com}

# SendGrid
sendgrid.api-key=${SENDGRID_API_KEY:}

#ReSend
resend.api-key=${RESEND_API_KEY:}

# Gmail SMTP fallback
spring.mail.host=${GMAIL_SMTP_HOST:}
spring.mail.port=${GMAIL_SMTP_PORT:587}
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# WebSocket
websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:*}

# OpenTelemetry Tracing
logging.pattern.level=%5p [${spring.application.name:},%X{trace_id:-},%X{span_id:-}]

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=true

# DevTools
spring.devtools.restart.enabled=${DEVTOOLS_RESTART:true}
spring.devtools.livereload.enabled=${DEVTOOLS_LIVERELOAD:true}
